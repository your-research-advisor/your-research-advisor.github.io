  /* Glitch effect */
  @keyframes glitch1 {
    0%   { clip-path: inset(0 0 95% 0); transform: translateX(-4px); }
    20%  { clip-path: inset(30% 0 60% 0); transform: translateX(4px); }
    40%  { clip-path: inset(60% 0 30% 0); transform: translateX(-2px); }
    60%  { clip-path: inset(80% 0 5% 0); transform: translateX(3px); }
    80%  { clip-path: inset(10% 0 80% 0); transform: translateX(-3px); }
    100% { clip-path: inset(0 0 95% 0); transform: translateX(0); }

  @keyframes glitch2 {
    0%   { clip-path: inset(70% 0 20% 0); transform: translateX(3px); opacity: 0.7; }

    50%  { clip-path: inset(50% 0 40% 0); transform: translateX(5px); }

  .glitch-wrap::after {
    content: attr(data-text);
    position: absolute;
    inset: 0;
    color: #fff;
    font-size: inherit;
    font-weight: inherit;
    letter-spacing: inherit;
    text-transform: inherit;
    line-height: inherit;

</style>

<script>
/* ── Apply theme CSS variables from CONFIG ── */
(function applyTheme() {
  const t = CONFIG.theme;
  const r = document.documentElement.style;
  r.setProperty('--accent',    t.accent);
  r.setProperty('--accent-dim',t.accentDim);
  r.setProperty('--bg',        t.bg);
  r.setProperty('--bg-card',   t.bgCard);
  r.setProperty('--border',    t.border);
  r.setProperty('--text',      t.text);
  r.setProperty('--text-dim',  t.textDim);
  r.setProperty('--mono',      t.fontMono);
  if (!t.scanlines) document.body.style.setProperty('--scanlines','none');
})();

/* ── Terminal boot sequence ── */
(function bootSequence() {
  const lines = [
    `[    0.000] Booting security research terminal...`,
    `[    0.021] Loading kernel modules: exploit_dev, vuln_research, reveng`,
    `[    0.048] Initializing fuzzing subsystem... OK`,
    `[    0.092] Mounting /proc/research... OK`,
    `[    0.133] Checking CVE database integrity... OK`,
    `[    0.201] Loading profile: ${CONFIG.name}`,
    `[    0.240] Establishing encrypted channel... OK`,
    `[    0.290] All systems operational.`,
    ``,
    `$ cat /etc/motd`,
    ``,
    `  ██╗  ██╗ █████╗  ██████╗██╗  ██╗███████╗██████╗`,
    `  ██║  ██║██╔══██╗██╔════╝██║ ██╔╝██╔════╝██╔══██╗`,
    `  ███████║███████║██║     █████╔╝ █████╗  ██████╔╝`,
    `  ██╔══██║██╔══██║██║     ██╔═██╗ ██╔══╝  ██╔══██╗`,
    `  ██║  ██║██║  ██║╚██████╗██║  ██╗███████╗██║  ██║`,
    `  ╚═╝  ╚═╝╚═╝  ╚═╝ ╚═════╝╚═╝  ╚═╝╚══════╝╚═╝  ╚═╝`,
    ``,
    `  "${CONFIG.tagline}"`,
    ``,
    `$ ./load_profile.sh`,
  ];

  const container = document.getElementById('boot-lines');
  let i = 0;
  function addLine() {
    if (i >= lines.length) {
      setTimeout(() => {
        const boot = document.getElementById('boot');
        boot.style.transition = 'opacity 0.5s';
        boot.style.opacity = '0';
        setTimeout(() => boot.remove(), 500);
      }, 300);
      return;
    }
    const p = document.createElement('p');
    p.textContent = lines[i] || '\u00A0';
    p.style.animationDelay = '0ms';
    container.appendChild(p);
    i++;
    setTimeout(addLine, i < 9 ? 40 : 60);
  }
  addLine();
})();

/* ── Populate page from CONFIG ── */
(function populate() {
  const $ = id => document.getElementById(id);

  // Nav brand
  $('nav-brand').textContent = CONFIG.name.toUpperCase();

  // Hero
  $('hero-prompt').textContent = 'whoami // ' + CONFIG.handle;
  const nameEl = $('hero-name');
  nameEl.textContent = CONFIG.name.toUpperCase();
  nameEl.dataset.text = CONFIG.name.toUpperCase();
  $('hero-tagline').innerHTML = CONFIG.tagline.replace(/·/g, '<span class="accent"> · </span>');
  $('hero-subtitle').textContent = CONFIG.subtitle;

  // Socials
  const socialsEl = $('hero-socials');
  CONFIG.socials.filter(s => s.url).forEach(s => {
    const a = document.createElement('a');
    a.href = s.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = `[ ${s.label} ]`;
    socialsEl.appendChild(a);
  });

  // Bio
  const bioEl = $('bio-text');
  CONFIG.bio.forEach(para => {
    const p = document.createElement('p');
    p.textContent = para;
    bioEl.appendChild(p);
  });

  // Articles
  const artEl = $('articles-list');
  CONFIG.articles.forEach(a => {
    const li = document.createElement('li');
    li.innerHTML = `
      <span class="art-date">${a.date}</span>
      <a class="art-title" href="${a.url}" target="_blank" rel="noopener">${a.title}</a>
    `;
    artEl.appendChild(li);
  });

  // Projects
  const projEl = $('projects-list');
  CONFIG.projects.forEach(p => {
    const li = document.createElement('li');
    li.innerHTML = `
      <span class="proj-year">${p.year}</span>
      <div class="proj-body">
        <a class="proj-name" href="${p.url}" target="_blank" rel="noopener">${p.name}</a>
        <p class="proj-desc">${p.desc}</p>
      </div>
    `;
    projEl.appendChild(li);
  });

  // CVEs
  const cveBody = $('cve-body');
  CONFIG.cves.forEach(c => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="cve-id">${c.id}</td>
      <td class="cve-target">${c.target}</td>
      <td><span class="cve-sev sev-${c.severity}">${c.severity}</span></td>
      <td class="cve-desc">${c.desc}</td>
    `;
    cveBody.appendChild(tr);
  });

  // Contact
  $('contact-note').textContent = CONFIG.contact.note;
  const cl = $('contact-list');
  const contactItems = [
    { key: 'e-mail', val: `<a href="mailto:${CONFIG.contact.email}">${CONFIG.contact.email}</a>` },
    ...CONFIG.socials.filter(s => s.url).map(s => ({
      key: s.label.toLowerCase(),
      val: `<a href="${s.url}" target="_blank" rel="noopener">${s.url.replace('https://','')}</a>`
    })),
  ];
  if (CONFIG.contact.pgp) {
    contactItems.push({ key: 'PGP', val: `<span class="pgp-badge">${CONFIG.contact.pgp}</span>` });
  }
  contactItems.forEach(item => {
    const li = document.createElement('li');
    li.innerHTML = `<span class="contact-key">${item.key}:</span><span class="contact-val">${item.val}</span>`;
    cl.appendChild(li);
  });

  // Footer
  $('footer-id').textContent = CONFIG.name.toUpperCase() + '.GITHUB.IO';
  $('footer-year').textContent = '© ' + new Date().getFullYear() + ' — All rights reserved.';

  // Glitch toggle
  if (!CONFIG.theme.glitch) {
    document.querySelectorAll('.glitch-wrap::before, .glitch-wrap::after')
      .forEach(el => el.style.display = 'none');
  }
  // Cursor toggle
  if (!CONFIG.theme.cursor) {
    document.querySelectorAll('.cursor').forEach(el => el.remove());
  }
})();
</script>
</body>
</html>
